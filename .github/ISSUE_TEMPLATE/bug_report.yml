name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start services with `./scripts/start-cerid.sh`
        2. Navigate to ...
        3. Click on ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System details
      placeholder: |
        - OS: macOS 15 / Ubuntu 24.04
        - Docker: 27.x
        - Python: 3.11
        - Cerid AI version: 0.82.0
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output (`docker logs ai-companion-mcp --tail 50`)
      render: shell
    validations:
      required: false
