version: 2
updates:
  # Python (pip)
  - package-ecosystem: pip
    directory: /src/mcp
    schedule:
      interval: weekly
      day: monday
    groups:
      python-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(py):"

  # NPM
  - package-ecosystem: npm
    directory: /src/web
    schedule:
      interval: weekly
      day: monday
    groups:
      npm-deps:
        patterns: ["*"]
    commit-message:
      prefix: "deps(npm):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(ci):"

  # Docker — MCP
  - package-ecosystem: docker
    directory: /src/mcp
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Web
  - package-ecosystem: docker
    directory: /src/web
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Infrastructure (Neo4j, ChromaDB, Redis)
  - package-ecosystem: docker
    directory: /stacks/infrastructure
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Gateway (Caddy)
  - package-ecosystem: docker
    directory: /stacks/gateway
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Tunnel (Cloudflare)
  - package-ecosystem: docker
    directory: /stacks/tunnel
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"
