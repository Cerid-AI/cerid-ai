version: 2
updates:
  # Python (pip)
  - package-ecosystem: pip
    directory: /src/mcp
    schedule:
      interval: weekly
      day: monday
    # Group non-major bumps; majors get their own PRs so they can be
    # audited/tested individually (e.g. chromadb must stay pinned to <0.6
    # until the server is upgraded).
    groups:
      python-deps:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Server pin (ChromaDB 0.5.23) dictates client version — no bumps
      # until server upgrade is scheduled.
      - dependency-name: "chromadb"
    commit-message:
      prefix: "deps(py):"

  # NPM
  - package-ecosystem: npm
    directory: /src/web
    schedule:
      interval: weekly
      day: monday
    # Group non-major bumps; majors get their own PRs so each breaking-change
    # migration (TypeScript 6, Vite 8, ESLint 10, etc.) can be staged and
    # audited independently.
    groups:
      npm-deps:
        patterns: ["*"]
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "deps(npm):"

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(ci):"

  # Docker — MCP
  - package-ecosystem: docker
    directory: /src/mcp
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Web
  - package-ecosystem: docker
    directory: /src/web
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Infrastructure (Neo4j, ChromaDB, Redis)
  - package-ecosystem: docker
    directory: /stacks/infrastructure
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Gateway (Caddy)
  - package-ecosystem: docker
    directory: /stacks/gateway
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"

  # Docker — Tunnel (Cloudflare)
  - package-ecosystem: docker
    directory: /stacks/tunnel
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(docker):"
