name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Python backend
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install ruff==0.15.4
      - run: ruff check src/mcp/
      # Pattern-violation checks: enforce CLAUDE.md "ONE pattern" table
      - name: "Pattern: no bare HTTPException in business logic"
        run: |
          # HTTPException belongs in routers only — business logic must use CeridError hierarchy
          VIOLATIONS=$(grep -rn "raise HTTPException" src/mcp/agents/ src/mcp/services/ src/mcp/utils/ --include="*.py" | grep -v "__pycache__" | grep -v "tests/" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Found bare HTTPException in business logic (use CeridError instead):"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "OK: no bare HTTPException in business logic"
      - name: "Pattern: no inline tier checks (must use @require_feature)"
        run: |
          # FEATURE_TIER should only be referenced in config/features.py and settings.py
          cd src/mcp
          VIOLATIONS=$(grep -rn 'FEATURE_TIER.*==.*"pro"' --include="*.py" | grep -v "config/features.py" | grep -v "__pycache__" | grep -v ".venv" | grep -v "tests/" | grep -v "# noqa" || true)
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Found inline FEATURE_TIER == \"pro\" checks (use @require_feature decorator):"
            echo "$VIOLATIONS"
            exit 1
          fi
          VIOLATIONS2=$(grep -rn 'CERID_TIER.*==.*"pro"' --include="*.py" | grep -v "config/features.py" | grep -v "config/settings.py" | grep -v "__pycache__" | grep -v ".venv" | grep -v "tests/" | grep -v "# noqa" || true)
          if [ -n "$VIOLATIONS2" ]; then
            echo "::error::Found inline CERID_TIER == \"pro\" checks (use @require_feature decorator):"
            echo "$VIOLATIONS2"
            exit 1
          fi
          echo "OK: no inline tier checks"
      - name: "Pattern: no silent except:pass"
        run: |
          # Every except block must log+degrade or raise a typed error — zero silent pass blocks
          # Threshold: 21 existing violations (target: 0). Fail if count increases.
          cd src/mcp
          COUNT=$(grep -rn "except.*:" --include="*.py" -A1 | grep -B1 "pass$" | grep -v "__pycache__" | grep -v ".venv" | grep -v "tests/" | grep "except" | wc -l)
          echo "Silent except:pass blocks: $COUNT (threshold: 21, target: 0)"
          if [ "$COUNT" -gt 21 ]; then
            echo "::error::New silent except:pass blocks introduced ($COUNT > 21 threshold). Fix or log+degrade instead."
            grep -rn "except.*:" --include="*.py" -A1 | grep -B1 "pass$" | grep -v "__pycache__" | grep -v ".venv" | grep -v "tests/" | grep "except"
            exit 1
          fi
          # NOTE: magic-number enforcement is manual — constants belong in config/constants.py

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r src/mcp/requirements.txt -r src/mcp/requirements-dev.txt
      - run: cd src/mcp && python -m mypy . --config-file ../../pyproject.toml

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: src/mcp/requirements.lock
      - run: pip install -r src/mcp/requirements.txt
      - run: pip install pytest pytest-asyncio httpx pytest-cov respx
      - name: Run tests with coverage
        run: cd src/mcp && python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=70
      - name: Upload coverage to Codecov
        if: success()
        uses: codecov/codecov-action@v5
        with:
          files: src/mcp/coverage.xml
          fail_ci_if_error: false
      - name: License audit (Python)
        run: |
          pip install pip-licenses
          pip-licenses --fail-on="GPL-2.0-only;GPL-3.0-only" --format=plain

  security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for secret scanning
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Secret detection (detect-secrets)
        run: |
          pip install detect-secrets==1.5.0
          TMPFILE=$(mktemp)
          export TMPFILE
          # Scan only git-tracked files (--all-files walks filesystem and enters .git/)
          git ls-files -z | xargs -0 detect-secrets scan \
            --exclude-files '\.env\.age$' \
            --exclude-files '\.lock$' \
            --exclude-files 'package-lock\.json$' \
            --exclude-files '\.github/workflows/ci\.yml$' \
            --exclude-files 'src/mcp/docs/inventory/' \
            --exclude-files 'scripts/env-lock\.sh$' \
            --exclude-files 'docs/CERID_AI_PROJECT_REFERENCE\.md$' \
            --exclude-files 'docs/OPERATIONS\.md$' \
            --exclude-files 'src/mcp/tests/test_middleware_auth\.py$' \
            --exclude-files 'src/mcp/tests/test_auth\.py$' \
            --exclude-files 'docs/plans/' \
            --exclude-files 'src/mcp/routers/setup\.py$' \
            > "$TMPFILE"
          # Fail if any secrets found
          python -c "
          import json, sys, os
          with open(os.environ['TMPFILE']) as f:
              results = json.load(f)
          secrets = {k: v for k, v in results.get('results', {}).items() if v}
          if secrets:
              print('::error::Potential secrets detected in:')
              for fname, findings in secrets.items():
                  for finding in findings:
                      print(f'  {fname}:{finding[\"line_number\"]} - {finding[\"type\"]}')
              sys.exit(1)
          print('No secrets detected.')
          "
          rm -f "$TMPFILE"
      - name: Python security scan (bandit)
        run: pip install bandit==1.9.4 && bandit -r src/mcp/ -ll --skip B101,B615 -x src/mcp/tests
      - name: Python dependency audit (including transitive deps)
        run: |
          pip install pip-audit==2.10.0
          pip install -r src/mcp/requirements.txt
          # CVE-2026-4539: ReDoS in pygments AdlLexer — local-only, we don't use ADL lexer, no upstream fix
          # CVE-2025-8869 / CVE-2026-1703: pip tar/wheel extraction — build-time only, Python 3.11 has PEP 706
          # CVE-2026-24049: wheel path traversal — build-time only, not runtime-exploitable
          # CVE-2026-28277: langgraph msgpack deserialization — post-exploitation only, requires checkpoint store write access, we don't use langgraph checkpoints
          # CVE-2026-27794: langgraph-checkpoint pickle fallback — post-exploitation only, requires cache backend write access, we don't enable langgraph caching
          pip-audit --desc \
            --ignore-vuln CVE-2026-4539 \
            --ignore-vuln CVE-2025-8869 \
            --ignore-vuln CVE-2026-1703 \
            --ignore-vuln CVE-2026-24049 \
            --ignore-vuln CVE-2026-28277 \
            --ignore-vuln CVE-2026-27794
      - name: ReDoS regex audit (dlint)
        run: |
          pip install dlint flake8
          python -m flake8 --select=DUO138 src/mcp/

  lock-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Use same Python image as Dockerfile to ensure identical pip-compile output
    container: python:3.11-slim
    steps:
      - uses: actions/checkout@v6
      - run: pip install pip-tools==7.5.3
      - name: Check Python lock file is up to date
        run: |
          cd src/mcp
          pip-compile requirements.txt -o /tmp/requirements.lock --generate-hashes --no-header --allow-unsafe
          diff requirements.lock /tmp/requirements.lock || (echo "::error::requirements.lock is out of date. Run: cd src/mcp && pip-compile requirements.txt -o requirements.lock --generate-hashes --no-header --allow-unsafe" && exit 1)

  # Frontend
  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: src/web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: src/web/.nvmrc
          cache: npm
          cache-dependency-path: src/web/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npx tsc -b
      - name: ESLint
        run: npm run lint
      - name: Vitest
        run: npm test
      - name: Vite build
        run: npx vite build
      - name: Check bundle size (fail if any chunk > 800KB)
        run: |
          max_bytes=$((800 * 1024))
          fail=0
          for file in dist/assets/*.js; do
            size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
            size_kb=$((size / 1024))
            echo "$file: ${size_kb}KB"
            if [ "$size" -gt "$max_bytes" ]; then
              echo "::error::Bundle chunk $file exceeds 800KB limit: ${size_kb}KB"
              fail=1
            fi
          done
          if [ "$fail" -eq 1 ]; then exit 1; fi
      - name: NPM dependency audit
        run: npm audit --audit-level=high
      - name: License audit (Node)
        run: npx license-checker --failOn "GPL-2.0;GPL-3.0" --production

  # Docker
  docker:
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, security, lock-sync, frontend, frontend-desktop]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Lint Dockerfiles (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/mcp/Dockerfile
          ignore: DL3008,DL3013,DL3045,DL3059
      - name: Lint Web Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: src/web/Dockerfile
          ignore: DL3008,DL3018,DL3059
      - run: docker build -t cerid-mcp-test src/mcp/
      - run: docker build -t cerid-web-test src/web/
      - name: Create Trivy ignore file
        run: |
          cat > .trivyignore <<'EOF'
          # glibc heap corruption — no fix available in Debian 13 yet
          CVE-2026-0861
          # wheel privilege escalation — build-time only, not exploitable at runtime
          CVE-2026-24049
          # systemd CVE in Debian 13 base — D-Bus RegisterMachine not reachable in container
          CVE-2026-4105
          # libxml2 CVEs in Alpine base — nginx serves static files only, no XML parsing
          CVE-2025-32414
          CVE-2025-32415
          CVE-2025-49794
          CVE-2025-49795
          CVE-2025-49796
          CVE-2025-6021
          # jaraco.context path traversal via tar — build-time pip dependency, not runtime-exploitable
          CVE-2026-23949
          EOF
      - name: Scan MCP Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: cerid-mcp-test
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore
          version: v0.69.3
          ignore-unfixed: true
      - name: Scan Web Docker image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: cerid-web-test
          severity: CRITICAL,HIGH
          exit-code: 1
          trivyignores: .trivyignore
          version: v0.69.3
          ignore-unfixed: true

  # Marketing site CI moved to Cerid-AI/cerid-ai-marketing repo (2026-03-31)

  frontend-desktop:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: packages/desktop
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/desktop/package-lock.json
      - run: npm ci
      - name: TypeScript type check
        run: npm run typecheck
