name: Electron Build

on:
  push:
    tags:
      - 'v*-desktop'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/desktop/package-lock.json

      - name: Build React GUI
        working-directory: src/web
        run: |
          npm ci
          npm run build

      - name: Install desktop dependencies
        working-directory: packages/desktop
        run: npm ci

      - name: Build Electron app
        working-directory: packages/desktop
        run: npm run build

      - name: Package for macOS (universal)
        working-directory: packages/desktop
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
            packages/desktop/release/*.yml

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: packages/desktop/package-lock.json

      - name: Build React GUI
        working-directory: src/web
        run: |
          npm ci
          npm run build

      - name: Install desktop dependencies
        working-directory: packages/desktop
        run: npm ci

      - name: Build Electron app
        working-directory: packages/desktop
        run: npm run build

      - name: Package for Windows
        working-directory: packages/desktop
        run: npm run package:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts to release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            packages/desktop/release/*.exe
            packages/desktop/release/*.yml
