services:
  mcp-server:
    container_name: ai-companion-mcp
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - .:/app
      - ~/cerid-archive:/archive:ro
      - ${CERID_SYNC_DIR:-~/Dropbox/cerid-sync}:/sync:ro
    env_file:
      - ../../.env
    environment:
      # Container-specific overrides (point to Docker service names)
      - CHROMA_URL=http://ai-companion-chroma:8000
      - NEO4J_URI=bolt://ai-companion-neo4j:7687
      - NEO4J_USER=neo4j
      - REDIS_URL=redis://ai-companion-redis:6379
      - BIFROST_URL=http://bifrost:8080/v1
      - ARCHIVE_PATH=/archive
      - CERID_SYNC_DIR=/sync
      # NEO4J_PASSWORD, CATEGORIZE_MODE, CERID_API_KEY, CORS_ORIGINS
      # are loaded from env_file above — do NOT override here, as
      # ${VAR} interpolation fails when running without --env-file.
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dashboard:
    container_name: ai-companion-dashboard
    build:
      context: ../gui
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cerid-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: cerid-web
    ports:
      - "3000:80"
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  llm-network:
    external: true
