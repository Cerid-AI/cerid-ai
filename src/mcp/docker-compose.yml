services:
  mcp-server:
    container_name: ai-companion-mcp
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./main.py:/app/main.py
      - .:/app
      - ~/cerid-archive:/archive:ro
    env_file:
      - ../../.env
    environment:
      - CHROMA_URL=http://ai-companion-chroma:8000
      - NEO4J_URI=bolt://ai-companion-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REDIS_URL=redis://ai-companion-redis:6379
      - PORT=8888
      - CATEGORIZE_MODE=${CATEGORIZE_MODE:-smart}
      - BIFROST_URL=http://bifrost:8080/v1
      - ARCHIVE_PATH=/archive
    networks:
      - llm-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dashboard:
    container_name: ai-companion-dashboard
    build:
      context: ../gui
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  cerid-web:
    build:
      context: ../web
      dockerfile: Dockerfile
    container_name: cerid-web
    ports:
      - "3000:80"
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      mcp-server:
        condition: service_healthy

networks:
  llm-network:
    external: true
