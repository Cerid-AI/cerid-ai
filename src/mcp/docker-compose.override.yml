services:
  mcp-server:
    depends_on:
      chromadb:
        condition: service_started
      neo4j:
        condition: service_started
      redis:
        condition: service_started

  chromadb:
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 30s
      timeout: 5s
      retries: 1
