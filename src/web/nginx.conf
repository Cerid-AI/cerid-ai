server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers (HSTS/CSP handled by Caddy gateway when enabled)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA fallback — all routes serve index.html
    # Never cache HTML responses (SPA entry + env-config change between deploys)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # Proxy Bifrost API (avoids CORS in production)
    # Uses variable-based proxy_pass so nginx starts even when Bifrost is not running
    location /api/bifrost/ {
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $bifrost_upstream http://bifrost:8080;
        proxy_pass $bifrost_upstream$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE support
        proxy_set_header Accept-Encoding "";
        chunked_transfer_encoding on;
    }

    # Proxy MCP API (avoids CORS + ensures SSE reliability)
    location /api/mcp/ {
        proxy_pass http://ai-companion-mcp:8888/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE support for verify-stream
        proxy_set_header Accept-Encoding "";
        chunked_transfer_encoding on;
    }

    # Runtime config files — never cache (regenerated on container start)
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
    }
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
    }

    # Cache static assets (hashed filenames make immutable safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip
    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
