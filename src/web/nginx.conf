server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    # Security headers (HSTS/CSP handled by Caddy gateway when enabled)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hashed static assets — immutable cache, return 404 on miss (never fallback to index.html)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # SPA fallback — all routes serve index.html
    # Never cache HTML responses (SPA entry + env-config change between deploys)
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # Bifrost proxy removed (2026-04-18) — Bifrost was retired; all LLM calls
    # go direct-to-OpenRouter via core/utils/llm_client. See CLAUDE.md
    # "Bifrost retirement" convention block.

    # Proxy MCP API (avoids CORS + ensures SSE reliability)
    location /api/mcp/ {
        client_max_body_size 50m;
        proxy_pass http://ai-companion-mcp:8888/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE support for verify-stream
        proxy_set_header Accept-Encoding "";
        chunked_transfer_encoding on;
    }

    # Runtime config files — never cache (regenerated on container start)
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
    }
    location = /version.json {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Access-Control-Allow-Origin "*";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        expires -1;
    }

    # Cache static assets (hashed filenames make immutable safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Gzip
    gzip on;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;
}
