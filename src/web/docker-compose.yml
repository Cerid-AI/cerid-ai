services:
  cerid-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cerid-web
    ports:
      - "${CERID_PORT_GUI:-3000}:80"
    environment:
      - VITE_MCP_URL=${VITE_MCP_URL:-http://localhost:8888}
    networks:
      - llm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "-qO/dev/null", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  llm-network:
    external: true
