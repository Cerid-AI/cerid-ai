services:
  cerid-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cerid-web
    ports:
      - "${CERID_BIND_ADDR:-127.0.0.1}:${CERID_PORT_GUI:-3000}:80"
    environment:
      - VITE_MCP_URL=${VITE_MCP_URL:-/api/mcp}
    networks:
      - llm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:80/ || kill -s TERM 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  llm-network:
    external: true
