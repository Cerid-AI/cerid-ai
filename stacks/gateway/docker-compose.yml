services:
  caddy:
    image: caddy:2-alpine
    container_name: cerid-gateway
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - llm-network
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  llm-network:
    external: true
