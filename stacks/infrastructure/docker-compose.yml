services:
  # NOTE: ${NEO4J_PASSWORD} requires --env-file ../../.env on the CLI.
  # Always start via scripts/start-cerid.sh which provides this flag.
  neo4j:
    container_name: ai-companion-neo4j
    image: neo4j:5.26.21-community
    ports:
      - "127.0.0.1:${CERID_PORT_NEO4J:-7474}:7474"
      - "127.0.0.1:${CERID_PORT_NEO4J_BOLT:-7687}:7687"
    volumes:
      - ./data/neo4j:/data
      - ./data/neo4j-logs:/logs
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_max__size=1G
      # Mac Pro has 160 GB RAM — pagecache of 2G keeps the full graph in
      # memory and eliminates disk reads from the ~600ms graph traversal.
      - NEO4J_server_memory_pagecache_size=2G
    networks:
      - llm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4G  # 1G heap + 2G pagecache + JVM overhead
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  chromadb:
    container_name: ai-companion-chroma
    image: chromadb/chroma:0.5.23
    ports:
      - "127.0.0.1:${CERID_PORT_CHROMA:-8001}:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=false
      - CHROMA_ANONYMIZED_TELEMETRY=false
      - ALLOW_RESET=false
      - IS_PERSISTENT=true
      - LOG_LEVEL=WARNING
      # HNSW tuning for better recall (applies to new collections)
      - CHROMA_HNSW_M=12
      - CHROMA_HNSW_EF_CONSTRUCTION=400
    networks:
      - llm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s

  redis:
    container_name: ai-companion-redis
    image: redis:7.4.8-alpine
    ports:
      - "127.0.0.1:${CERID_PORT_REDIS:-6379}:6379"
    volumes:
      - ./data/redis:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?Set REDIS_PASSWORD in .env} --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - llm-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  llm-network:
    external: true
