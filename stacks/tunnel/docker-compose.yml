services:
  cloudflared:
    image: cloudflare/cloudflared:2025.4.2
    container_name: cerid-tunnel
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - llm-network
    restart: unless-stopped
    depends_on: []
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:2000/ready || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 2
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M

networks:
  llm-network:
    external: true
