services:
  api:
    container_name: LibreChat
    networks:
      - default
      - llm-network
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    depends_on:
      mongodb:
        condition: service_healthy  # Wait for Mongo ready
      rag_api:
        condition: service_healthy  # Wait for RAG ready
    image: ghcr.io/danny-avila/librechat-dev:latest@sha256:5146154223d71cd8fab80ebd3d34f1705a7e16b54ad31ad0ccad51efdf287a8c
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://chat-mongodb:27017/LibreChat  # Fixed: Use container_name
      - MEILI_HOST=http://chat-meilisearch:7700  # Fixed: Use container_name
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - ../../.env:/app/.env:ro  # Read-only, from repo root
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ${CERID_ARTIFACTS_DIR:-~/cerid-archive}:/app/artifacts:ro
    healthcheck:  # Ensure API healthy
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-qO/dev/null", "http://127.0.0.1:${PORT:-3080}/api/auth/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.17
    restart: always
    command: mongod --noauth --bind_ip_all  # Allow all connections
    volumes:
      - ./data-node:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.12.3
    restart: always
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY:-}  # Set in .env for production
    volumes:
      - ./meili_data_v1.12:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-qO/dev/null", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag_api:
    container_name: rag_api
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest@sha256:293ebcfdc7118a8e7b67e569ccc278bd07e999e9718ce3c8bfa5bdbcafa40e88
    restart: always
    depends_on:
      vectordb:
        condition: service_healthy  # Ensure PG ready
    ports:
      - "${RAG_PORT:-8000}:${RAG_PORT:-8000}"
    environment:
      # Database (from .env with dev defaults)
      - POSTGRES_DB=${POSTGRES_DB:-mydatabase}
      - POSTGRES_USER=${POSTGRES_USER:-myuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mypassword}
      - DB_HOST=vectordb
      # RAG/Server
      - RAG_PORT=${RAG_PORT:-8000}
      # Embeddings (CRITICAL: Fixes crash)
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # From .env (OpenRouter key)
      - EMBEDDINGS_PROVIDER=openai
      - EMBEDDINGS_MODEL=text-embedding-3-small
    env_file:
      - ../../.env  # From repo root
    volumes:
      - ./logs:/app/logs  # Shared logs
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata2:
    driver: local  # Explicit driver

networks:
  llm-network:
    external: true
