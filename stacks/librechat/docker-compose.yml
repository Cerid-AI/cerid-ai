services:
  api:
    container_name: LibreChat
    networks:
      - default
      - llm-network
    ports:
      - "${PORT:-3080}:${PORT:-3080}"
    depends_on:
      mongodb:
        condition: service_healthy  # Wait for Mongo ready
      rag_api:
        condition: service_healthy  # Wait for RAG ready
    image: ghcr.io/danny-avila/librechat-dev:latest
    restart: always
    user: "${UID:-1000}:${GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - HOST=0.0.0.0
      - MONGO_URI=mongodb://chat-mongodb:27017/LibreChat  # Fixed: Use container_name
      - MEILI_HOST=http://chat-meilisearch:7700  # Fixed: Use container_name
      - RAG_PORT=${RAG_PORT:-8000}
      - RAG_API_URL=http://rag_api:${RAG_PORT:-8000}
    volumes:
      - ./.env:/app/.env:ro  # Read-only for security
      - ./images:/app/client/public/images
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./librechat.yaml:/app/librechat.yaml:ro
      - ~/Dropbox/AI-Artifacts:/app/artifacts:ro  # Re-added for PKB artifacts
    healthcheck:  # Ensure API healthy
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${PORT:-3080}/api/auth/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mongodb:
    container_name: chat-mongodb
    image: mongo:8.0.17
    restart: always
    command: mongod --noauth --bind_ip_all  # Allow all connections
    volumes:
      - ./data-node:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.12.3
    restart: always
    environment:
      - MEILI_NO_ANALYTICS=true
      - MEILI_MASTER_KEY=  # Empty for dev (no auth)
    volumes:
      - ./meili_data_v1.12:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  vectordb:
    container_name: vectordb
    image: pgvector/pgvector:0.8.0-pg15-trixie
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
    restart: always
    volumes:
      - pgdata2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myuser -d mydatabase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rag_api:
    container_name: rag_api
    image: ghcr.io/danny-avila/librechat-rag-api-dev-lite:latest
    restart: always
    depends_on:
      vectordb:
        condition: service_healthy  # Ensure PG ready
    ports:
      - "${RAG_PORT:-8000}:${RAG_PORT:-8000}"
    environment:
      # Database (explicit for safety)
      - POSTGRES_DB=mydatabase
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - DB_HOST=vectordb
      # RAG/Server
      - RAG_PORT=${RAG_PORT:-8000}
      # Embeddings (CRITICAL: Fixes crash)
      - OPENAI_API_KEY=${OPENAI_API_KEY}  # From .env (OpenRouter key)
      - EMBEDDINGS_PROVIDER=openai
      - EMBEDDINGS_MODEL=text-embedding-3-small
    env_file:
      - .env  # Fallback: All other vars
    volumes:
      - ./logs:/app/logs  # Shared logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${RAG_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  pgdata2:
    driver: local  # Explicit driver

networks:
  llm-network:
    external: true
