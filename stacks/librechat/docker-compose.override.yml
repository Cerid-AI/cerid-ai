services:
  api:
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3080/api/auth/version"]
      interval: 30s
      timeout: 10s
      retries: 5           # increased from original 3
      start_period: 90s    # increased from original 40s

    depends_on:
      rag_api:
        condition: service_started   # more lenient
      mongodb:
        condition: service_started

  rag_api:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 8           # increased from original 5
      start_period: 120s   # increased from original 60s

  meilisearch:
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7700/health || wget --no-verbose --tries=1 --spider http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5