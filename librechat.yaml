version: 1.2.1
cache: true

mcpSettings:
  allowedDomains:
    - "ai-companion-mcp"
    - "host.docker.internal"

mcpServers:
  ai-companion:
    type: sse
    url: "http://ai-companion-mcp:8888/mcp/sse"

endpoints:
  custom:
    - name: "Bifrost Gateway"
      apiKey: "not-needed"
      baseURL: "http://bifrost:8080/v1"
      models:
        default:
          # ══════════════════════════════════════════════════════════════
          # 🧠 CODING & COMPLEX REASONING (Claude - Best for code)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/anthropic/claude-opus-4.5"
          - "openrouter/anthropic/claude-sonnet-4.5"
          - "openrouter/anthropic/claude-haiku-4.5"
          - "openrouter/anthropic/claude-sonnet-4"
          - "openrouter/anthropic/claude-opus-4"

          # ══════════════════════════════════════════════════════════════
          # 🔍 RESEARCH & CURRENT EVENTS (Grok - Real-time X data)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/x-ai/grok-4-fast"
          - "openrouter/x-ai/grok-4.1-fast"
          - "openrouter/x-ai/grok-code-fast-1"
          - "openrouter/x-ai/grok-3"
          - "openrouter/x-ai/grok-3-mini"

          # ══════════════════════════════════════════════════════════════
          # 💼 GENERAL PURPOSE (GPT - Professional tasks)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/openai/gpt-5.2"
          - "openrouter/openai/gpt-5.1"
          - "openrouter/openai/gpt-4o"
          - "openrouter/openai/gpt-4o-mini"
          - "openrouter/openai/o1"
          - "openrouter/openai/o1-mini"

          # ══════════════════════════════════════════════════════════════
          # 📄 LONG CONTEXT & MULTIMODAL (Gemini - 1M tokens)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/google/gemini-3-pro-preview"
          - "openrouter/google/gemini-3-flash-preview"
          - "openrouter/google/gemini-2.5-pro"
          - "openrouter/google/gemini-2.5-flash"
          - "openrouter/google/gemini-2.5-flash-lite"

          # ══════════════════════════════════════════════════════════════
          # 💰 BEST VALUE (DeepSeek - Frontier quality, 1/100th cost)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/deepseek/deepseek-v3.2"
          - "openrouter/deepseek/deepseek-chat"
          - "openrouter/deepseek/deepseek-r1"

          # ══════════════════════════════════════════════════════════════
          # 🦙 OPEN SOURCE (Meta Llama)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/meta-llama/llama-3.3-70b-instruct"

          # ══════════════════════════════════════════════════════════════
          # 🆓 FREE MODELS (Rate limited but $0)
          # ══════════════════════════════════════════════════════════════
          - "openrouter/x-ai/grok-4-fast:free"
          - "openrouter/google/gemini-2.0-flash-exp:free"
          - "openrouter/xiaomi/mimo-v2-flash:free"

        fetch: false
      titleConvo: true
      titleModel: "openrouter/openai/gpt-4o-mini"
      modelDisplayLabel: "Bifrost"
      dropParams:
        - "user"

  openAI:
    disabled: true
  anthropic:
    disabled: true
  google:
    disabled: true
  assistants:
    disabled: true