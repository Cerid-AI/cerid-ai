[project]
name = "cerid-sdk"
version = "0.1.0"
description = "Python SDK for Cerid AI Knowledge Companion"
requires-python = ">=3.9"
license = "Apache-2.0"
authors = [{ name = "Cerid AI", email = "dev@cerid.ai" }]
readme = "README.md"
keywords = ["cerid", "ai", "knowledge-base", "rag", "sdk"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.25",
    "pydantic>=2.0",
]

[project.optional-dependencies]
async = ["httpx[http2]"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cerid"]
